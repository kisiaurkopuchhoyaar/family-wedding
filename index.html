        <div class="announcement-container">

                Abhishek &amp; Komal are getting married on April 23, 2026
            </h1>

            <p class="save-the-date reveal">Save the date</p>

            <!-- Hero couple names with modern typography -->
            <div class="couple-names reveal">
                <span class="name" aria-hidden="true">Abhishek</span>
                <span class="ampersand" aria-hidden="true">&amp;</span>
                <span class="name" aria-hidden="true">Komal</span>
            </div>

            <!-- Date & time – using &lt;time&gt; for semantics -->

                Tuesday, April 21, 2026
            </time>

            <!-- Venue -->
            <!--             <p class="venue">
                Goreakothi • Siwan, Bihar
            </p> -->

            <!-- Elegant divider with heart symbol -->

                <span class="symbol">♡</span>
                <span></span>
            </div>

            <!-- Short romantic message -->

                With joyful hearts we invite you to celebrate the beginning of our forever.
            </p>



        </div>
